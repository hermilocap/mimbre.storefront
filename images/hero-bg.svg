<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Gradiente de fondo tipo atardecer en taller artesanal -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C4B8A4"/>
      <stop offset="45%"  stop-color="#B8A88E"/>
      <stop offset="100%" stop-color="#A09078"/>
    </linearGradient>
    <!-- Gradiente de piso -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#8C7E6C"/>
      <stop offset="100%" stop-color="#6A5C4C"/>
    </linearGradient>
    <!-- Luz cenital cálida -->
    <radialGradient id="lightBeam" cx="55%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#FFE8B0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFE8B0" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%"  stop-color="#2C2822" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2C2822" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- Pared de fondo -->
  <rect width="1920" height="800" fill="url(#wallGrad)"/>
  <!-- Piso -->
  <rect y="780" width="1920" height="300" fill="url(#floorGrad)"/>
  <!-- Línea horizonte / zócalo -->
  <rect y="778" width="1920" height="5" fill="#7A6C5C" opacity="0.6"/>

  <!-- Luz cenital -->
  <rect width="1920" height="1080" fill="url(#lightBeam)"/>

  <!-- ── Lámpara Órbita colgante (centro-derecha) ── -->
  <!-- Cable -->
  <line x1="1100" y1="0" x2="1100" y2="200" stroke="#6A5C4C" stroke-width="3"/>
  <!-- Esfera mimbre grande -->
  <circle cx="1100" cy="340" r="140" fill="#C0AA86"/>
  <!-- Anillos textura -->
  <ellipse cx="1100" cy="220" rx="110" ry="18" fill="none" stroke="#A89468" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="1100" cy="270" rx="135" ry="22" fill="none" stroke="#A89468" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="1100" cy="320" rx="140" ry="24" fill="none" stroke="#A89468" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="1100" cy="370" rx="140" ry="24" fill="none" stroke="#A89468" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="1100" cy="420" rx="135" ry="22" fill="none" stroke="#A89468" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="1100" cy="460" rx="110" ry="18" fill="none" stroke="#A89468" stroke-width="2" opacity="0.65"/>
  <!-- Brillo esfera -->
  <circle cx="1040" cy="290" r="45" fill="white" opacity="0.07"/>
  <!-- Luz emitida hacia abajo -->
  <radialGradient id="lampGlow" cx="50%" cy="100%" r="60%">
    <stop offset="0%"   stop-color="#FFD070" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFD070" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="1100" cy="480" rx="200" ry="240" fill="url(#lampGlow)"/>

  <!-- ── Canastas en repisa izquierda ── -->
  <!-- Repisa -->
  <rect x="120" y="480" width="420" height="18" rx="4" fill="#8C7A62"/>
  <rect x="148" y="498" width="10" height="80" rx="3" fill="#7A6A52"/>
  <rect x="520" y="498" width="10" height="80" rx="3" fill="#7A6A52"/>

  <!-- Canasta grande en repisa -->
  <path d="M160 400 Q160 480 330 484 Q500 480 500 400 L484 355 Q450 338 330 338 Q210 338 176 355 Z" fill="#C4B090"/>
  <ellipse cx="330" cy="357" rx="154" ry="24" fill="#B8A07C"/>
  <ellipse cx="330" cy="357" rx="154" ry="24" fill="none" stroke="#A09060" stroke-width="2.5"/>
  <path d="M176 380 Q330 398 484 380" fill="none" stroke="#A09060" stroke-width="2" opacity="0.6"/>
  <path d="M165 410 Q330 430 495 410" fill="none" stroke="#A09060" stroke-width="2" opacity="0.6"/>
  <path d="M162 440 Q330 460 498 440" fill="none" stroke="#A09060" stroke-width="2" opacity="0.6"/>
  <path d="M160 468 Q330 484 500 468" fill="none" stroke="#A09060" stroke-width="2" opacity="0.6"/>

  <!-- Canasta pequeña sobre la grande -->
  <path d="M230 314 Q230 356 330 360 Q430 356 430 314 L420 286 Q400 274 330 274 Q260 274 240 286 Z" fill="#D4C4A0"/>
  <ellipse cx="330" cy="288" rx="100" ry="16" fill="#C4B088"/>
  <ellipse cx="330" cy="288" rx="100" ry="16" fill="none" stroke="#B4A078" stroke-width="2"/>
  <path d="M230 308 Q330 322 430 308" fill="none" stroke="#B4A078" stroke-width="1.8" opacity="0.6"/>
  <path d="M230 330 Q330 344 430 330" fill="none" stroke="#B4A078" stroke-width="1.8" opacity="0.6"/>
  <path d="M233 350 Q330 362 427 350" fill="none" stroke="#B4A078" stroke-width="1.8" opacity="0.6"/>

  <!-- ── Set de baño en superficie baja (derecha) ── -->
  <!-- Mesa baja -->
  <rect x="1350" y="680" width="460" height="14" rx="4" fill="#8C7A62"/>

  <!-- Cilindro organizador -->
  <path d="M1395 560 L1395 680 Q1450 688 1505 680 L1505 560" fill="#C4B090"/>
  <ellipse cx="1450" cy="560" rx="55" ry="14" fill="#B4A080"/>
  <ellipse cx="1450" cy="560" rx="55" ry="14" fill="none" stroke="#A09060" stroke-width="2.5"/>
  <ellipse cx="1450" cy="680" rx="55" ry="10" fill="#A09060"/>
  <path d="M1396 585 Q1450 595 1504 585" fill="none" stroke="#A09060" stroke-width="1.8" opacity="0.6"/>
  <path d="M1396 612 Q1450 622 1504 612" fill="none" stroke="#A09060" stroke-width="1.8" opacity="0.6"/>
  <path d="M1396 638 Q1450 648 1504 638" fill="none" stroke="#A09060" stroke-width="1.8" opacity="0.6"/>
  <path d="M1396 664 Q1450 672 1504 664" fill="none" stroke="#A09060" stroke-width="1.8" opacity="0.6"/>

  <!-- Portavela con llama -->
  <path d="M1560 608 L1560 680 Q1610 686 1660 680 L1660 608" fill="#C4B090"/>
  <ellipse cx="1610" cy="608" rx="50" ry="12" fill="#B4A080"/>
  <ellipse cx="1610" cy="608" rx="50" ry="12" fill="none" stroke="#A09060" stroke-width="2"/>
  <rect x="1590" y="585" width="40" height="24" rx="4" fill="#FAF0DC" opacity="0.8"/>
  <line x1="1610" y1="585" x2="1610" y2="568" stroke="#8C7060" stroke-width="1.5"/>
  <ellipse cx="1610" cy="562" rx="5" ry="8" fill="#FFB830" opacity="0.9"/>
  <ellipse cx="1610" cy="560" rx="3" ry="5" fill="#FFE080"/>
  <radialGradient id="cGlow" cx="50%" cy="80%" r="60%">
    <stop offset="0%"   stop-color="#FFD060" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="1610" cy="620" rx="90" ry="70" fill="url(#cGlow)"/>

  <!-- ── Textura de pared: ligeras líneas de yeso ── -->
  <line x1="0"    y1="200" x2="1920" y2="185" stroke="#B0A090" stroke-width="0.8" opacity="0.2"/>
  <line x1="0"    y1="450" x2="1920" y2="440" stroke="#B0A090" stroke-width="0.8" opacity="0.15"/>
  <line x1="0"    y1="650" x2="1920" y2="645" stroke="#B0A090" stroke-width="0.8" opacity="0.15"/>

  <!-- Vignette oscura en bordes -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Gradiente inferior extra para que el texto hero destaque -->
  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#2C2822" stop-opacity="0"/>
    <stop offset="100%" stop-color="#2C2822" stop-opacity="0.72"/>
  </linearGradient>
  <rect y="400" width="1920" height="680" fill="url(#bottomFade)"/>
</svg>
