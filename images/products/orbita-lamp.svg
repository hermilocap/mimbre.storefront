<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1066">
  <!-- Fondo lino cálido -->
  <rect width="800" height="1066" fill="#EDE8DF"/>

  <!-- Sombra proyectada en la pared (efecto de lámpara) -->
  <ellipse cx="400" cy="820" rx="180" ry="30" fill="#D4CEC4" opacity="0.5"/>
  <path d="M320 500 Q400 820 480 500" fill="#D4CEC4" opacity="0.18"/>

  <!-- Cable desde arriba -->
  <line x1="400" y1="0" x2="400" y2="248" stroke="#8C8579" stroke-width="2.5"/>
  <!-- Accesorio techo -->
  <rect x="386" y="60" width="28" height="10" rx="2" fill="#A89880"/>

  <!-- Esfera de mimbre — base -->
  <circle cx="400" cy="430" r="182" fill="#C8B99A"/>

  <!-- Textura de tejido — líneas horizontales curvas (aros de mimbre) -->
  <ellipse cx="400" cy="300" rx="160" ry="22" fill="none" stroke="#A89472" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="340" rx="178" ry="26" fill="none" stroke="#A89472" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="385" rx="182" ry="28" fill="none" stroke="#A89472" stroke-width="2.2" opacity="0.75"/>
  <ellipse cx="400" cy="430" rx="182" ry="28" fill="none" stroke="#A89472" stroke-width="2.2" opacity="0.75"/>
  <ellipse cx="400" cy="475" rx="182" ry="28" fill="none" stroke="#A89472" stroke-width="2.2" opacity="0.75"/>
  <ellipse cx="400" cy="520" rx="178" ry="26" fill="none" stroke="#A89472" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="560" rx="160" ry="22" fill="none" stroke="#A89472" stroke-width="2" opacity="0.7"/>

  <!-- Líneas verticales curvas (trenzado longitudinal) -->
  <path d="M400 248 Q218 300 220 430 Q218 560 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q260 290 252 430 Q260 570 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q308 272 300 430 Q308 588 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q356 260 354 430 Q356 600 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q444 260 446 430 Q444 600 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q492 272 500 430 Q492 588 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q540 290 548 430 Q540 570 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>
  <path d="M400 248 Q582 300 580 430 Q582 560 400 612" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.5"/>

  <!-- Brillo suave (reflejo de la luz interna) -->
  <circle cx="340" cy="360" r="60" fill="white" opacity="0.08"/>
  <circle cx="355" cy="375" r="30" fill="white" opacity="0.07"/>

  <!-- Apertura inferior (hueco de la lámpara) -->
  <ellipse cx="400" cy="612" rx="90" ry="18" fill="#8C7A60"/>
  <ellipse cx="400" cy="612" rx="75" ry="13" fill="#6B5A42"/>

  <!-- Resplandor cálido que emana -->
  <radialGradient id="glow" cx="50%" cy="58%" r="38%">
    <stop offset="0%" stop-color="#FFD080" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#FFD080" stop-opacity="0"/>
  </radialGradient>
  <circle cx="400" cy="430" r="182" fill="url(#glow)"/>

  <!-- Etiqueta inferior -->
  <text x="400" y="960" font-family="Georgia,serif" font-size="22" fill="#8C8579"
        text-anchor="middle" letter-spacing="5" opacity="0.7">LÁMPARA ÓRBITA</text>
  <text x="400" y="990" font-family="Arial,sans-serif" font-size="12" fill="#8C8579"
        text-anchor="middle" letter-spacing="3" opacity="0.45">Reemplazar con fotografía real</text>
</svg>
