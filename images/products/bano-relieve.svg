<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1066">
  <!-- Fondo -->
  <rect width="800" height="1066" fill="#ECE7DE"/>

  <!-- Superficie / mesa -->
  <rect x="80" y="820" width="640" height="6" rx="3" fill="#C8C0B4" opacity="0.6"/>

  <!-- Sombras -->
  <ellipse cx="220" cy="822" rx="110" ry="14" fill="#C0B8AC" opacity="0.4"/>
  <ellipse cx="480" cy="822" rx="65"  ry="10" fill="#C0B8AC" opacity="0.4"/>
  <ellipse cx="650" cy="822" rx="55"  ry="10" fill="#C0B8AC" opacity="0.4"/>

  <!-- ══ PIEZA 1: Bandeja rectangular ══ -->
  <!-- Base bandeja -->
  <path d="M110 750 Q110 820 220 822 Q330 820 330 750 L318 700 Q290 685 220 685 Q150 685 122 700 Z"
        fill="#C8B99A"/>
  <!-- Borde bandeja -->
  <ellipse cx="220" cy="702" rx="100" ry="18" fill="#B8A880"/>
  <ellipse cx="220" cy="702" rx="100" ry="18" fill="none" stroke="#A89468" stroke-width="2.5"/>
  <!-- Tejido bandeja horizontal -->
  <path d="M122 724 Q220 738 318 724" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.65"/>
  <path d="M116 748 Q220 764 324 748" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.65"/>
  <path d="M112 772 Q220 789 328 772" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.65"/>
  <path d="M110 797 Q220 812 330 797" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.65"/>
  <!-- Tejido bandeja vertical -->
  <path d="M160 702 Q152 760 154 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M200 686 Q192 760 194 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M240 686 Q248 760 246 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M280 702 Q286 760 286 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <!-- Interior bandeja con jabón -->
  <ellipse cx="220" cy="705" rx="88" ry="14" fill="#DDD5C5" opacity="0.5"/>
  <rect x="192" y="692" width="56" height="26" rx="8" fill="#E8E0D4" opacity="0.7"/>

  <!-- ══ PIEZA 2: Organizador cilíndrico ══ -->
  <!-- Cuerpo cilindro -->
  <path d="M415 620 L415 820 Q480 828 545 820 L545 620" fill="#C8B99A"/>
  <!-- Tapa superior cilindro -->
  <ellipse cx="480" cy="620" rx="65" ry="18" fill="#B8A880"/>
  <ellipse cx="480" cy="620" rx="65" ry="18" fill="none" stroke="#A89468" stroke-width="2.5"/>
  <!-- Base cilindro -->
  <ellipse cx="480" cy="820" rx="65" ry="12" fill="#A89470"/>
  <!-- Tejido cilindro horizontal -->
  <path d="M416 650 Q480 662 544 650" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M416 685 Q480 697 544 685" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M416 720 Q480 732 544 720" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M416 755 Q480 767 544 755" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M416 790 Q480 800 544 790" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <!-- Tejido cilindro vertical -->
  <path d="M440 620 L440 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M460 618 L460 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M480 618 L480 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M500 618 L500 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <path d="M520 620 L520 820" fill="none" stroke="#B8A484" stroke-width="1.4" opacity="0.4"/>
  <!-- Contenido: palitos de incienso/pinceles -->
  <line x1="458" y1="480" x2="462" y2="624" stroke="#8C7A60" stroke-width="2.5" opacity="0.7"/>
  <line x1="472" y1="470" x2="476" y2="624" stroke="#8C7A60" stroke-width="2.5" opacity="0.7"/>
  <line x1="486" y1="475" x2="488" y2="624" stroke="#8C7A60" stroke-width="2.5" opacity="0.7"/>
  <line x1="498" y1="482" x2="500" y2="624" stroke="#8C7A60" stroke-width="2.5" opacity="0.7"/>

  <!-- ══ PIEZA 3: Portavela trenzado ══ -->
  <!-- Cuerpo portavela (más bajo y ancho) -->
  <path d="M595 720 L595 820 Q650 828 705 820 L705 720" fill="#C8B99A"/>
  <!-- Tapa portavela -->
  <ellipse cx="650" cy="720" rx="55" ry="14" fill="#B8A880"/>
  <ellipse cx="650" cy="720" rx="55" ry="14" fill="none" stroke="#A89468" stroke-width="2.5"/>
  <!-- Base portavela -->
  <ellipse cx="650" cy="820" rx="55" ry="10" fill="#A89470"/>
  <!-- Tejido portavela -->
  <path d="M596 742 Q650 752 704 742" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M596 764 Q650 774 704 764" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M596 787 Q650 796 704 787" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <path d="M596 808 Q650 816 704 808" fill="none" stroke="#A89468" stroke-width="1.8" opacity="0.6"/>
  <!-- Vela interior -->
  <rect x="630" y="692" width="40" height="30" rx="4" fill="#FAF0DC" opacity="0.85"/>
  <ellipse cx="650" cy="692" rx="20" ry="6" fill="#F5EDD0" opacity="0.85"/>
  <!-- Mecha y llama -->
  <line x1="650" y1="692" x2="650" y2="672" stroke="#8C7060" stroke-width="1.5"/>
  <ellipse cx="650" cy="666" rx="5" ry="8" fill="#FFB830" opacity="0.85"/>
  <ellipse cx="650" cy="664" rx="3" ry="5" fill="#FFE080" opacity="0.9"/>
  <!-- Aura cálida de la vela -->
  <radialGradient id="candleGlow" cx="50%" cy="80%" r="50%">
    <stop offset="0%" stop-color="#FFD060" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="650" cy="690" rx="80" ry="60" fill="url(#candleGlow)"/>

  <!-- Etiqueta -->
  <text x="400" y="960" font-family="Georgia,serif" font-size="22" fill="#8C8579"
        text-anchor="middle" letter-spacing="5" opacity="0.7">SET BAÑO RELIEVE</text>
  <text x="400" y="990" font-family="Arial,sans-serif" font-size="12" fill="#8C8579"
        text-anchor="middle" letter-spacing="3" opacity="0.45">Reemplazar con fotografía real</text>
</svg>
