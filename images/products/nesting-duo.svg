<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1066">
  <!-- Fondo -->
  <rect width="800" height="1066" fill="#EAE4DA"/>

  <!-- Sombra de la canasta grande -->
  <ellipse cx="400" cy="800" rx="230" ry="28" fill="#C8C0B4" opacity="0.5"/>

  <!-- ══ CANASTA GRANDE ══ -->
  <!-- Cuerpo principal -->
  <path d="M170 520 Q170 780 400 790 Q630 780 630 520 L600 430 Q560 400 400 400 Q240 400 200 430 Z"
        fill="#C8B99A"/>

  <!-- Borde superior / aro -->
  <ellipse cx="400" cy="430" rx="200" ry="32" fill="#B8A880"/>
  <ellipse cx="400" cy="430" rx="200" ry="32" fill="none" stroke="#A89468" stroke-width="3"/>

  <!-- Textura tejido grande — horizontales -->
  <path d="M200 470 Q400 490 600 470" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M190 510 Q400 535 610 510" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M182 555 Q400 582 618 555" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M176 600 Q400 630 624 600" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M172 648 Q400 678 628 648" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M170 698 Q400 728 630 698" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>
  <path d="M170 745 Q400 770 630 745" fill="none" stroke="#A89468" stroke-width="2" opacity="0.6"/>

  <!-- Textura tejido grande — verticales -->
  <path d="M250 430 Q235 600 240 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>
  <path d="M310 408 Q296 600 300 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>
  <path d="M370 403 Q358 600 360 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>
  <path d="M430 403 Q440 600 440 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>
  <path d="M490 408 Q502 600 500 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>
  <path d="M550 430 Q562 600 560 790" fill="none" stroke="#B8A484" stroke-width="1.5" opacity="0.4"/>

  <!-- ══ CANASTA PEQUEÑA (dentro / encima) ══ -->
  <!-- Sombra interna -->
  <ellipse cx="400" cy="438" rx="130" ry="20" fill="#8C7A60" opacity="0.25"/>

  <!-- Cuerpo canasta pequeña -->
  <path d="M270 390 Q270 470 400 478 Q530 470 530 390 L516 348 Q490 332 400 332 Q310 332 284 348 Z"
        fill="#D4C5A8"/>

  <!-- Borde superior canasta pequeña -->
  <ellipse cx="400" cy="350" rx="130" ry="21" fill="#C8B690"/>
  <ellipse cx="400" cy="350" rx="130" ry="21" fill="none" stroke="#B8A478" stroke-width="2.5"/>

  <!-- Textura canasta pequeña -->
  <path d="M272 374 Q400 390 528 374" fill="none" stroke="#B0A070" stroke-width="1.8" opacity="0.65"/>
  <path d="M270 400 Q400 418 530 400" fill="none" stroke="#B0A070" stroke-width="1.8" opacity="0.65"/>
  <path d="M272 426 Q400 444 528 426" fill="none" stroke="#B0A070" stroke-width="1.8" opacity="0.65"/>
  <path d="M278 452 Q400 468 522 452" fill="none" stroke="#B0A070" stroke-width="1.8" opacity="0.65"/>

  <!-- Brillo sutil canasta pequeña -->
  <ellipse cx="360" cy="360" rx="40" ry="20" fill="white" opacity="0.08"/>

  <!-- Etiqueta -->
  <text x="400" y="960" font-family="Georgia,serif" font-size="22" fill="#8C8579"
        text-anchor="middle" letter-spacing="5" opacity="0.7">DÚO NESTING</text>
  <text x="400" y="990" font-family="Arial,sans-serif" font-size="12" fill="#8C8579"
        text-anchor="middle" letter-spacing="3" opacity="0.45">Reemplazar con fotografía real</text>
</svg>
